<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LinkedIn Analyzer</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <!-- Animated Background -->
    <div class="bg-paths">
      <svg class="paths-svg" viewBox="0 0 400 600" preserveAspectRatio="none">
        <path class="path-1" d="M-100 -50C-100 -50 -50 100 100 150C250 200 300 350 300 350" />
        <path class="path-2" d="M-80 -30C-80 -30 -30 120 120 170C270 220 320 370 320 370" />
        <path class="path-3" d="M-60 -10C-60 -10 -10 140 140 190C290 240 340 390 340 390" />
        <path class="path-4" d="M500 -50C500 -50 450 100 300 150C150 200 100 350 100 350" />
        <path class="path-5" d="M480 -30C480 -30 430 120 280 170C130 220 80 370 80 370" />
      </svg>
    </div>

    <!-- Header -->
    <div class="header">
      <h1 class="title">
        <span class="title-word">LinkedIn</span>
        <span class="title-word">Analyzer</span>
      </h1>
    </div>

    <!-- Status Message -->
    <div id="status" class="status">
      <p>Navigate to a LinkedIn profile to analyze</p>
    </div>

    <!-- Main Content -->
    <div id="content" class="content hidden">
      <div class="profile-info">
        <h2 id="profileName" class="profile-name">-</h2>
        <p id="profileHeadline" class="profile-headline">-</p>
      </div>

      <div class="button-group">
        <button id="analyzeBtn" class="btn btn-primary">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
            <path d="M13 10V3L4 14h7v7l9-11h-7z" fill="currentColor"/>
          </svg>
          <span>Analyze Profile</span>
        </button>

        <button id="deepAnalyzeBtn" class="btn btn-secondary">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
            <path d="M12 2L2 7v10c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V7l-10-5z" fill="currentColor"/>
          </svg>
          <span>Deep Analysis</span>
        </button>

        <!-- Optimize button hidden - use standalone website instead -->
        <!--
        <button id="optimizeBtn" class="btn btn-outline" style="display: none;">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
            <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z" fill="currentColor"/>
          </svg>
          <span>Optimize This Profile</span>
        </button>
        -->
      </div>

      <!-- Results -->
      <div id="results" class="results hidden">
        <div class="score-card">
          <div class="score-circle">
            <svg width="100" height="100">
              <circle cx="50" cy="50" r="45" stroke="#e5e7eb" stroke-width="6" fill="none"/>
              <circle id="scoreCircle" cx="50" cy="50" r="45" stroke="#000" stroke-width="6" fill="none" 
                      stroke-dasharray="282.743" stroke-dashoffset="282.743" 
                      transform="rotate(-90 50 50)" stroke-linecap="round"/>
            </svg>
            <div class="score-text">
              <span id="scoreValue">0</span>
            </div>
          </div>
        </div>

        <div class="insights">
          <h3 class="insights-title">Insights</h3>
          <div id="insightsList" class="insights-list"></div>
        </div>

        <div class="actions">
          <button id="exportBtn" class="btn btn-outline">Export Data</button>
        </div>
      </div>

      <!-- Loading -->
      <div id="loading" class="loading hidden">
        <div class="spinner"></div>
        <p>Analyzing profile...</p>
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
